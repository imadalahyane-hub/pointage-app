name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.2'
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Fix gradle.properties
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
      - name: Fix manifest icons
        run: |
          sed -i 's|android:icon="@mipmap/ic_launcher"||g' app/src/main/AndroidManifest.xml
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"||g' app/src/main/AndroidManifest.xml
      - name: Create missing drawables
        run: |
          mkdir -p app/src/main/res/drawable
          ARROW='<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFFFFFFF" android:pathData="M20,11H7.83l5.59,-5.59L12,4l-8,8 8,8 1.41,-1.41L7.83,13H20v-2z"/></vector>'
          FP='<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FF1565C0" android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2z"/></vector>'
          CHECK_G='<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FF2E7D32" android:pathData="M9,16.17L4.83,12l-1.42,1.41L9,19 21,7l-1.41,-1.41z"/></vector>'
          CHECK_B='<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FF1565C0" android:pathData="M9,16.17L4.83,12l-1.42,1.41L9,19 21,7l-1.41,-1.41z"/></vector>'
          MORE='<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FF000000" android:pathData="M12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,10c-1.1,0 -2,0.9 -2,2s0.9,2 2,2 2,-0.9 2,-2 -0.9,-2 -2,-2zM12,16c-1.1,0 -2,0.9 -2,2s0.9,2 2,2 2,-0.9 2,-2 -0.9,-2 -2,-2z"/></vector>'
          echo "$ARROW" > app/src/main/res/drawable/ic_arrow_back.xml
          echo "$FP"    > app/src/main/res/drawable/ic_fingerprint.xml
          echo "$FP"    > app/src/main/res/drawable/ic_fingerprint_success.xml
          echo "$FP"    > app/src/main/res/drawable/ic_fingerprint_error.xml
          echo "$CHECK_G" > app/src/main/res/drawable/ic_check_green.xml
          echo "$CHECK_B" > app/src/main/res/drawable/ic_check_blue.xml
          echo "$MORE"  > app/src/main/res/drawable/ic_more_vert.xml
      - name: Fix layout errors
        run: |
          sed -i 's/android:margin=/android:layout_margin=/g' app/src/main/res/layout/item_employee.xml
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: pointage-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
