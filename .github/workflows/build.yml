name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.2'
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Fix gradle.properties
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
      - name: Fix manifest icons
        run: |
          sed -i 's|android:icon="@mipmap/ic_launcher"||g' app/src/main/AndroidManifest.xml
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"||g' app/src/main/AndroidManifest.xml
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: pointage-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
